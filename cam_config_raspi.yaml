# =====================================================
# Raspberry Pi 5 camera configuration
# =====================================================
# This file supports two camera types side-by-side:
#
#   type: picamera2  →  Raspberry Pi Camera Module (via libcamera / picamera2)
#   type: v4l2        →  USB UVC camera (via pupil-labs-uvc)
#
# You can configure any mix of picamera2 and uvc entries in this file.
# Each entry is an independent camera topic; ports must be unique.
#
# UVC cameras require extra one-time system setup (run setup_raspi.sh once):
#   - USB udev rules so the 'video' group can open the device
#   - Passwordless sudo for `modprobe uvcvideo` (driver reset on startup)
#   - pupil-labs-uvc Python package (included in the [raspi] install extra)
# =====================================================

# =====================================================
# Single Pi Camera Module (head camera)
# =====================================================
first_camera:
  # if enable_zmq and enable_webrtc are both false, the camera will not start
  # Set to true to enable ZMQ publishing, false to disable
  enable_zmq: true
  # Port to publish camera stream via ZMQ PUB-SUB.  image_client.py connects to the same port.
  zmq_port: 55555
  # Set to true to enable WebRTC publishing, false to disable
  enable_webrtc: true
  # Port for WebRTC signaling server
  webrtc_port: 60001
  # webrtc codec preference, options: "vp8", "h264"
  webrtc_codec: h264

  # Camera type: "picamera2" uses the Raspberry Pi Camera Module via libcamera
  type: picamera2

  # Index of the Pi Camera Module (0 for the first camera, 1 for a second camera)
  camera_num: 0

  # Image Format
  # image resolution: [height, width]
  image_shape: [720, 1280]
  binocular: false
  # frame per second
  fps: 30

  # The following identifiers (video_id, serial_number, physical_path) are used
  # only for uvc/opencv camera types (not picamera2).  Leave them as null here.
  video_id: null
  serial_number: null
  physical_path: null

# =====================================================
# Additional Pi Camera Modules (optional)
# =====================================================
# Uncomment and configure the block below to add a second Pi Camera Module.
# Requires a Raspberry Pi with two camera connectors (e.g. RPi 5 or CM4).
#
second_camera:
  enable_zmq: true
  zmq_port: 55556
  enable_webrtc: true
  webrtc_port: 60002
  webrtc_codec: h264
  type: picamera2
  camera_num: 1
  image_shape: [720, 1280]
  binocular: false
  fps: 30
  video_id: null
  serial_number: null
  physical_path: null

# =====================================================
# USB UVC camera (optional)
# =====================================================
# Uncomment and configure the block below to add a USB UVC camera alongside
# the Pi Camera Module(s) above.  Run setup_raspi.sh first to install the
# required system dependencies (udev rules, modprobe sudoers, pupil-labs-uvc).
#
# Camera identifier priority: physical_path > serial_number > video_id
# Set unused identifiers to null.
#
# To discover connected UVC cameras and their identifiers, run:
#   teleimager-server --cf
#
head_camera:
  enable_zmq: true
  zmq_port: 55557
  enable_webrtc: true
  webrtc_port: 60003
  webrtc_codec: h264
  type: v4l2
  image_shape: [480, 640]
  binocular: false
  fps: 120
  # Camera identifiers (choose one or more; priority: physical_path > serial_number > video_id):
  video_id: null
  serial_number: null
  physical_path: /sys/devices/platform/axi/1000120000.pcie/1f00300000.usb/xhci-hcd.1/usb3/3-1/3-1:1.0
